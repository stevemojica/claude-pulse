name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build all targets
        run: swift build -c release

      - name: Verify CLI runs
        run: |
          # CLI will fail without keychain credentials, but it should
          # at least start and produce the expected error message
          .build/release/ClaudePulseCLI 2>&1 || true
