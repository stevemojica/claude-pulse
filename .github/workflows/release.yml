name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP="Claude Pulse.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp .build/release/ClaudePulse "$APP/Contents/MacOS/"
          cp AppIcon.icns "$APP/Contents/Resources/" 2>/dev/null || true
          cp Scripts/install.sh "$APP/Contents/Resources/"
          cp Scripts/com.claudepulse.agent.plist "$APP/Contents/Resources/"
          cp Scripts/claude-hook.sh "$APP/Contents/Resources/"
          cp Scripts/install-hooks.sh "$APP/Contents/Resources/"

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.claudepulse.app</string>
              <key>CFBundleName</key>
              <string>Claude Pulse</string>
              <key>CFBundleDisplayName</key>
              <string>Claude Pulse</string>
              <key>CFBundleExecutable</key>
              <string>ClaudePulse</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleVersion</key>
              <string>${{ steps.version.outputs.VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.VERSION }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "Claude Pulse.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Claude Pulse" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Pulse v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg
