name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release

      - name: Generate app icon
        run: |
          if [ -f AppIcon.png ]; then
            ./Scripts/generate-icns.sh AppIcon.png
            echo "Generated AppIcon.icns from AppIcon.png"
          elif [ -f AppIcon.icns ]; then
            echo "Using existing AppIcon.icns"
          else
            echo "Warning: No app icon found"
          fi

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Create app bundle
        run: |
          APP="Claude Pulse.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp .build/release/ClaudePulse "$APP/Contents/MacOS/"
          cp .build/release/ClaudePulseBridge "$APP/Contents/MacOS/"
          cp AppIcon.icns "$APP/Contents/Resources/" 2>/dev/null || true
          cp Scripts/install.sh "$APP/Contents/Resources/"
          cp Scripts/com.claudepulse.agent.plist "$APP/Contents/Resources/"
          cp Scripts/claude-hook.sh "$APP/Contents/Resources/"
          cp Scripts/install-hooks.sh "$APP/Contents/Resources/"

          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.claudepulse.app</string>
              <key>CFBundleName</key>
              <string>Claude Pulse</string>
              <key>CFBundleDisplayName</key>
              <string>Claude Pulse</string>
              <key>CFBundleExecutable</key>
              <string>ClaudePulse</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleVersion</key>
              <string>${{ steps.version.outputs.VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.VERSION }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Code sign the app
        run: |
          # Find the Developer ID Application certificate
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')

          if [ -z "$IDENTITY" ]; then
            echo "Warning: No Developer ID Application certificate found. Skipping code signing."
          else
            echo "Signing with: $IDENTITY"

            # Sign all binaries inside the app bundle
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" \
              "Claude Pulse.app/Contents/MacOS/ClaudePulseBridge"

            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" \
              "Claude Pulse.app/Contents/MacOS/ClaudePulse"

            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" \
              "Claude Pulse.app"

            # Verify
            codesign --verify --deep --strict "Claude Pulse.app"
            echo "Code signing verified successfully"
          fi

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "Claude Pulse.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Claude Pulse" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Sign DMG
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            codesign --force --timestamp \
              --sign "$IDENTITY" \
              "ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg"
            echo "DMG signed successfully"
          fi

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg"

          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_ID_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Warning: Notarization secrets not configured. Skipping notarization."
            exit 0
          fi

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"
          echo "Notarization complete"

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Pulse v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ClaudePulse-${{ steps.version.outputs.VERSION }}.dmg
